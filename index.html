<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>circlesintersects</title>
  </head>
  <body>
    <div id="app"></div>
    <div style="position:fixed; top:20px; left:20px; z-index:10; display:flex; gap:10px;">
      <button id="add-circle-btn" style="padding:10px 16px; background:#4a9eff; color:white; border:none; border-radius:6px; cursor:pointer; font-size:16px;">
        ➕ Добавить круг
      </button>
      <button id="clear-scene-btn" style="padding:10px 16px; background:#ff6b6b; color:white; border:none; border-radius:6px; cursor:pointer; font-size:16px;">
        🗑 Очистка сцены
      </button>
    </div>

    <div id="circle-panel" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:#1e1e2f; padding:25px 30px; border-radius:12px; color:white; z-index:100; min-width:250px; box-shadow:0 8px 30px rgba(0,0,0,0.7);">
      <h3 style="margin-top:0; text-align:center;">Новая окружность</h3>
      <label style="display:block; margin-bottom:8px;">
        Скорость:
        <input type="number" id="speed-input" value="1.0" step="0.1" style="width:100%; padding:4px; margin-top:2px; background:#2a2a3a; color:white; border:1px solid #555; border-radius:4px;">
      </label>
      <label style="display:block; margin-bottom:8px;">
        Направление (градусы):
        <input type="number" id="angle-input" value="0" step="1" style="width:100%; padding:4px; margin-top:2px; background:#2a2a3a; color:white; border:1px solid #555; border-radius:4px;">
      </label>
      <label style="display:block; margin-bottom:8px;">
        Радиус:
        <input type="number" id="radius-input" value="0.08" step="0.01" style="width:100%; padding:4px; margin-top:2px; background:#2a2a3a; color:white; border:1px solid #555; border-radius:4px;">
      </label>
      <div style="display:flex; gap:10px; margin-top:15px;">
        <button id="create-circle-btn" style="flex:1; padding:8px; background:#4a9eff; border:none; border-radius:4px; color:white; cursor:pointer;">Создать</button>
        <button id="close-panel-btn" style="flex:1; padding:8px; background:#666; border:none; border-radius:4px; color:white; cursor:pointer;">Отмена</button>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
